name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Lending Contract CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        
      - name: Set toolchain env variable
        run: echo "toolchain=stable" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: |
          cd stellar-lend/contracts/lending
          cargo fmt -- --check

      - name: Run clippy
        run: |
          cd stellar-lend/contracts/lending
          cargo clippy --all-targets --all-features -- -D warnings -A deprecated

      - name: Build project
        run: |
          cd stellar-lend/contracts/lending
          cargo build --verbose

      - name: Run tests
        run: |
          cd stellar-lend/contracts/lending
          cargo test --verbose

      - name: Generate lending test report
        run: |
          cd stellar-lend/contracts/lending
          cargo test --verbose -- --nocapture > lending_test_report.txt
          cat lending_test_report.txt

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: lending-test-report
          path: stellar-lend/contracts/lending/lending_test_report.txt

      # Pin version so line-% thresholds stay comparable across CI runs (latest
      # tarpaulin/llvm can shift percentages without code changes).
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked --version 0.31.0

      # Keep the long-term lending target at 88% while scoping out non-lending crates
      # that can be pulled into tarpaulin line accounting in workspace runs.
      - name: Generate code coverage
        run: |
          cd stellar-lend
          cargo tarpaulin --verbose --out Xml \
            --manifest-path contracts/lending/Cargo.toml \
            --packages stellarlend-lending \
            --fail-under 88 \
            --exclude-files "client/**/*" \
            --exclude-files "contracts/amm/**/*" \
            --exclude-files "contracts/hello-world/**/*" \
            --exclude-files "indexing_system/**/*"

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: |
          cd stellar-lend
          cargo audit --ignore RUSTSEC-2026-0049
